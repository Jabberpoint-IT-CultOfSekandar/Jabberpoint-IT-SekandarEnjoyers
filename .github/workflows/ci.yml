name: DTAP Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Compile and create jar
        run: |
          mkdir -p out
          javac -d out src/*.java
          jar cfe JabberPoint.jar JabberPoint -C out .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: JabberPoint.jar

  test:
    needs: build
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: actions/download-artifact@v4
        with:
          name: app

      - name: Run app (test simulation)
        run: echo "No tests defined"

  acceptance:
    needs: test
    runs-on: ubuntu-latest
    environment: acceptance

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app

      - name: Acceptance step
        run: echo "Acceptance approved"

  production:
    needs: acceptance
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app

      - name: Production deploy
        run: echo "Production deployment done"