plugins {
    id 'java'
    id 'jacoco'
}

group = 'org.jabberpoint'
version = '1.0-SNAPSHOT'

sourceCompatibility = '1.8'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.hamcrest:hamcrest-core:1.3'
}

sourceSets {
    main {
        java {
            srcDirs = ['src']
        }
    }
    test {
        java {
            srcDirs = ['test']
        }
    }
}

jacoco {
    toolVersion = '0.8.11'
}

test {
    useJUnit()
    systemProperty 'java.awt.headless', 'true'
    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "short"
    }
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
}
